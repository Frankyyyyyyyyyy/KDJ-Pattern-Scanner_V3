name: Stock List Update

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: |
      contains(github.event.issue.labels.*.name, 'stock-update') &&
      (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER' || github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply update
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python tools/apply_stock_list_update.py

      - name: Rebuild dashboard
        run: |
          python build_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_list.csv dashboard.html index.html
          git diff --cached --quiet || git commit -m "Update stock_list from issue #${{ github.event.issue.number }}"
          git pull --rebase --autostash origin main
          git push

      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ 已更新 `stock_list.csv` 并重建 Pages。请等待 1-2 分钟后刷新页面查看。'
            })
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            })

