name: Daily KDJ Scan 每日信号扫描

on:
  # 每天美东时间 18:00 (UTC 23:00) 自动运行 — 推迟1小时以确保数据就绪
  schedule:
    - cron: '0 23 * * 1-5'   # Mon-Fri, UTC 23:00 = ET 18:00

  # 也可手动触发（方便测试）
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行 (忽略休市检查)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout（拉取完整历史，包含 archive 目录）
      - name: Checkout 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Python
      - name: Setup Python 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies 安装依赖
        run: |
          pip install -r requirements.txt

      # 4. Run scanner
      # 定时触发时：默认不强制 (FORCE_RUN='0')，由脚本判断是否交易日
      # 手动触发时：根据输入决定
      - name: Run KDJ Scanner 运行信号扫描
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run || '0' }}
          PYTHONUNBUFFERED: '1'
        run: |
          python run_strategy.py

      # 5. Rebuild dashboard data（合并当前+历史CSV，生成 signals_latest.csv）
      - name: Rebuild Dashboard Data 重建仪表盘数据
        run: |
          python build_dashboard.py

      # 6. Commit CSV + dashboard data（信号文件 + 归档 + 数据缓存）
      - name: Commit results 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p archive
          mkdir -p price_cache
          shopt -s nullglob
          git add signals_*.csv signals_latest.csv index.html archive/ price_cache/
          # 如果没有变化则不提交
          git diff --cached --quiet || git commit -m "📊 Daily scan $(date -u +%Y-%m-%d)"
          # 拉取最新代码避免冲突（工作区需干净；若有变更会自动暂存）
          git pull --rebase --autostash origin main
          git push

  # 部署到 GitHub Pages
  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout 检出最新代码
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages 配置Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact 上传产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages 部署到Pages
        id: deployment
        uses: actions/deploy-pages@v4
